<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Requested — Build Block Agency</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a1a; line-height: 1.6; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 48px; max-width: 500px; text-align: center; margin: 20px; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.6rem; margin-bottom: 12px; }
        p { color: #64748b; margin-bottom: 16px; }
        .highlight { background: #fef3c7; padding: 16px; border-radius: 8px; margin: 20px 0; }
        .highlight p { color: #92400e; margin: 0; font-weight: 600; }
        a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>You're All Set!</h1>
        <p>We've received your audit request and we're already looking at your site.</p>
        <div class="highlight">
            <p>⏰ Expect your personalized audit report within 48 hours.</p>
        </div>
        <p>We'll email you directly with our findings and recommendations — no sales pitch, just actionable insights.</p>
        <p><a href="index.html">← Back to Build Block Agency</a></p>
    </div>
